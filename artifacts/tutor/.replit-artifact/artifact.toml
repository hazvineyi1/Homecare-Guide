kind = "web"
previewPath = "/"
title = "Socratic Homecare Tutor"
version = "1.0.0"
id = "artifacts/tutor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19403

[services.development]
run = "pnpm --filter @workspace/tutor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tutor", "run", "build" ]
publicDir = "artifacts/tutor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19403"
BASE_PATH = "/"
